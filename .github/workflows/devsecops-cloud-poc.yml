name: Audit Securite Fournisseur SaaS

on:
  workflow_dispatch:
    inputs:
      provider_name:
        description: 'Nom du fournisseur ou de la solution SaaS'
        required: true
        default: 'SaaS-Provider-Evaluation'

jobs:
  audit-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Recuperation du Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Scan des Secrets (Gitleaks)
        run: |
          docker run --rm -v ${{ github.workspace }}:/path ghcr.io/gitleaks/gitleaks:latest detect --source=/path --report-path=/path/gitleaks.json --verbose || true

      - name: 3. Installation et Analyse des Dependances
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-format JSON --output-file sbom.json --omit dev || true

      # ---- ANALYSE STATIQUE (SONARQUBE CLOUD) ----
      - name: 4. Analyse Code de SonarQube Cloud
        uses: sonarsource/sonarqube-scan-action@v6
        continue-on-error: true # Permet de passer aux étapes 5 et 6 même si Sonar trouve des failles
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.organization=mirak-kimko
            -Dsonar.projectKey=mirak-kimko
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,public/**
            -Dsonar.javascript.node.maxSpace=4096
            -Dsonar.qualitygate.wait=false

      - name: 5. Analyse de Securite avec Aqua Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: 6. Publication des Rapports d'Audit
        uses: actions/upload-artifact@v4
        with:
          name: rapports-securite-bruts
          path: |
            gitleaks.json
            sbom.json
            trivy-results.json
